// ════════════════════════════════════════════
// ПОЛЬЗОВАТЕЛЬСКИЕ HTML-ПРИЛОЖЕНИЯ
// ════════════════════════════════════════════
const CustomApps = {
  // Список: [{id, name, icon, html}]
  list: (() => {
    try { return JSON.parse(localStorage.getItem('kos_custom_apps') || '[]'); } catch(e) { return []; }
  })(),

  save() {
    // Сохраняем только метаданные, html хранится отдельно чтобы не раздувать
    const meta = this.list.map(a => ({ id: a.id, name: a.name, icon: a.icon }));
    try { localStorage.setItem('kos_custom_apps_meta', JSON.stringify(meta)); } catch(e) {}
    // Каждый html отдельно
    this.list.forEach(a => {
      try { localStorage.setItem('kos_capp_' + a.id, a.html); } catch(e) {}
    });
  },

  loadAll() {
    try {
      const meta = JSON.parse(localStorage.getItem('kos_custom_apps_meta') || '[]');
      this.list = meta.map(m => {
        const html = localStorage.getItem('kos_capp_' + m.id) || '<p>Ошибка загрузки</p>';
        return { ...m, html };
      });
    } catch(e) { this.list = []; }
  },

  add(name, icon, htmlContent) {
    const id = 'capp_' + Date.now();
    this.list.push({ id, name, icon, html: htmlContent });
    this.save();
    // Добавить в установленные приложения
    if (!ST.installed.includes(id)) {
      ST.installed.push(id);
      localStorage.setItem('kos_apps', JSON.stringify(ST.installed));
    }
    UI.renderIcons();
    UI.renderStartMenu();
    notify('Приложение установлено', `✓ «${name}» добавлено на рабочий стол`);
  },

  remove(id) {
    const app = this.list.find(a => a.id === id);
    this.list = this.list.filter(a => a.id !== id);
    this.save();
    localStorage.removeItem('kos_capp_' + id);
    ST.installed = ST.installed.filter(i => i !== id);
    localStorage.setItem('kos_apps', JSON.stringify(ST.installed));
    WM.close(id);
    UI.renderIcons();
    UI.renderStartMenu();
    if (app) notify('Удалено', `🗑 «${app.name}» удалено`);
  },

  open(id) {
    const app = this.list.find(a => a.id === id);
    if (!app) { notify('Ошибка', 'Приложение не найдено'); return; }
    // Открываем в iframe внутри окна
    const iframeId = 'win-' + id;
    const iframeSrc = URL.createObjectURL(new Blob([app.html], { type: 'text/html' }));
    const html = `<iframe src="${iframeSrc}" style="width:100%;height:100%;border:none;border-radius:0 0 var(--r) var(--r);" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>`;
    WM.create({ id: iframeId, title: app.name, icon: app.icon, w: 800, h: 560, html });
  },

  // Менеджер установки приложений
  openManager() {
    const renderList = () => {
      const el = document.getElementById('capp-list');
      if (!el) return;
      el.innerHTML = this.list.length === 0
        ? `<div style="text-align:center;padding:30px;color:var(--tx2);font-size:13px">Нет установленных приложений.<br>Загрузите HTML-файл ниже.</div>`
        : this.list.map(a => `
          <div style="display:flex;align-items:center;gap:12px;padding:10px 13px;background:rgba(255,255,255,0.04);border:1px solid var(--bd);border-radius:9px;margin-bottom:7px;transition:border-color .15s" onmouseover="this.style.borderColor='var(--bda)'" onmouseout="this.style.borderColor='var(--bd)'">
            <span style="font-size:26px">${a.icon}</span>
            <div style="flex:1">
              <div style="font-size:calc(13px * var(--zoom));font-weight:700;color:var(--tx)">${a.name}</div>
              <div style="font-size:10px;color:var(--tx2);margin-top:2px">HTML-приложение · ID: ${a.id}</div>
            </div>
            <button onclick="CustomApps.open('${a.id}')" style="padding:5px 11px;background:rgba(0,229,255,0.1);border:1px solid var(--bda);border-radius:6px;cursor:pointer;font-size:11px;font-weight:700;color:var(--a);transition:all .13s" onmouseover="this.style.background='rgba(0,229,255,0.2)'" onmouseout="this.style.background='rgba(0,229,255,0.1)'">▶ Открыть</button>
            <button onclick="if(confirm('Удалить «${a.name}»?'))CustomApps.remove('${a.id}')" style="padding:5px 11px;background:rgba(255,96,88,0.1);border:1px solid rgba(255,96,88,0.35);border-radius:6px;cursor:pointer;font-size:11px;font-weight:700;color:#ff6058;transition:all .13s" onmouseover="this.style.background='rgba(255,96,88,0.2)'" onmouseout="this.style.background='rgba(255,96,88,0.1)'">🗑 Удалить</button>
          </div>`).join('');
    };

    const html = `<div style="padding:16px;display:flex;flex-direction:column;gap:14px;height:100%;overflow:auto">
      <!-- Секция установки -->
      <div style="background:rgba(0,229,255,0.04);border:1px solid var(--bda);border-radius:12px;padding:16px">
        <div style="font-size:10px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--a);margin-bottom:12px">📦 УСТАНОВИТЬ ПРИЛОЖЕНИЕ</div>

        <!-- Drag & Drop зона -->
        <div id="capp-dropzone"
          style="border:2px dashed var(--bd);border-radius:10px;padding:28px;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:12px"
          onclick="document.getElementById('capp-filein').click()"
          ondragover="event.preventDefault();this.style.borderColor='var(--a)';this.style.background='rgba(0,229,255,0.07)'"
          ondragleave="this.style.borderColor='var(--bd)';this.style.background='transparent'"
          ondrop="cappHandleDrop(event)">
          <div style="font-size:44px;margin-bottom:8px">📄</div>
          <div style="font-size:calc(14px * var(--zoom));font-weight:700;color:var(--tx);margin-bottom:4px">Нажмите или перетащите HTML-файл</div>
          <div style="font-size:calc(11px * var(--zoom));color:var(--tx2)">Поддерживаются одиночные .html файлы · Скрипты, стили и изображения (base64) внутри</div>
        </div>
        <input type="file" id="capp-filein" accept=".html,.htm" multiple style="display:none" onchange="cappLoadFiles(this.files)">

        <!-- Ручной ввод -->
        <details style="margin-top:4px">
          <summary style="cursor:pointer;font-size:calc(12px * var(--zoom));color:var(--tx2);padding:6px 0;list-style:none;display:flex;align-items:center;gap:6px">
            <span>✏</span><span>Или вставьте HTML-код вручную</span>
          </summary>
          <div style="margin-top:10px;display:flex;flex-direction:column;gap:8px">
            <div style="display:flex;gap:8px">
              <input id="capp-name" placeholder="Название приложения" style="flex:1;padding:7px 11px;background:rgba(255,255,255,0.07);border:1px solid var(--bd);border-radius:7px;color:var(--tx);font-size:calc(12px * var(--zoom));outline:none" onfocus="this.style.borderColor='var(--bda)'" onblur="this.style.borderColor='var(--bd)'">
              <input id="capp-icon" placeholder="Иконка (эмодзи)" style="width:110px;padding:7px 11px;background:rgba(255,255,255,0.07);border:1px solid var(--bd);border-radius:7px;color:var(--tx);font-size:calc(12px * var(--zoom));outline:none" onfocus="this.style.borderColor='var(--bda)'" onblur="this.style.borderColor='var(--bd)'">
            </div>
            <textarea id="capp-code" placeholder="Вставьте HTML-код сюда…" style="width:100%;height:100px;background:rgba(0,0,0,0.3);border:1px solid var(--bd);border-radius:7px;color:var(--tx);font-family:'Courier New',monospace;font-size:calc(11px * var(--zoom));padding:9px;outline:none;resize:vertical;line-height:1.5" onfocus="this.style.borderColor='var(--bda)'" onblur="this.style.borderColor='var(--bd)'"></textarea>
            <button onclick="cappInstallManual()" style="align-self:flex-start;padding:7px 18px;background:linear-gradient(135deg,var(--a),var(--a3));border:none;border-radius:7px;cursor:pointer;font-size:calc(12px * var(--zoom));font-weight:800;color:#000;transition:transform .1s" onmousedown="this.style.transform='scale(.96)'" onmouseup="this.style.transform=''">
              ⚡ Установить
            </button>
          </div>
        </details>
      </div>

      <!-- Список установленных -->
      <div>
        <div style="font-size:10px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--a);margin-bottom:10px">
          🗂 УСТАНОВЛЕННЫЕ (${this.list.length})
        </div>
        <div id="capp-list"></div>
      </div>

      <!-- Советы -->
      <div style="padding:12px;background:rgba(255,255,255,0.03);border:1px solid var(--bd);border-radius:8px;font-size:calc(11px * var(--zoom));color:var(--tx2);line-height:1.9">
        💡 <strong style="color:var(--tx)">Советы:</strong><br>
        • HTML открывается в изолированном iframe<br>
        • Для работы JS — скрипты должны быть внутри файла<br>
        • Изображения вставляйте как base64 или через URL<br>
        • Файл должен быть самодостаточным (один .html)
      </div>
    </div>`;

    window.cappHandleDrop = (e) => {
      e.preventDefault();
      const zone = document.getElementById('capp-dropzone');
      if (zone) { zone.style.borderColor = 'var(--bd)'; zone.style.background = 'transparent'; }
      cappLoadFiles(e.dataTransfer.files);
    };

    window.cappLoadFiles = (files) => {
      Array.from(files).forEach(file => {
        if (!file.name.match(/\.html?$/i)) { notify('Ошибка', `«${file.name}» — не HTML-файл`); return; }
        const reader = new FileReader();
        reader.onload = (e) => {
          const name = file.name.replace(/\.html?$/i, '').replace(/[-_]/g, ' ');
          // Выбираем иконку по ключевым словам
          const nameLow = name.toLowerCase();
          let icon = '📄';
          if (nameLow.includes('игр') || nameLow.includes('game')) icon = '🎮';
          else if (nameLow.includes('музык') || nameLow.includes('music') || nameLow.includes('плеер')) icon = '🎵';
          else if (nameLow.includes('калькул') || nameLow.includes('calc')) icon = '🧮';
          else if (nameLow.includes('карт') || nameLow.includes('map')) icon = '🗺';
          else if (nameLow.includes('погод') || nameLow.includes('weather')) icon = '🌤';
          else if (nameLow.includes('фото') || nameLow.includes('photo') || nameLow.includes('рисо')) icon = '🖼';
          else if (nameLow.includes('чат') || nameLow.includes('chat') || nameLow.includes('мессенд')) icon = '💬';
          else if (nameLow.includes('код') || nameLow.includes('code') || nameLow.includes('редакт')) icon = '💻';
          else if (nameLow.includes('таймер') || nameLow.includes('timer') || nameLow.includes('часы')) icon = '⏱';
          else if (nameLow.includes('todo') || nameLow.includes('задач') || nameLow.includes('список')) icon = '✅';
          CustomApps.add(name, icon, e.target.result);
          renderList();
        };
        reader.readAsText(file);
      });
    };

    window.cappInstallManual = () => {
      const name = document.getElementById('capp-name')?.value?.trim();
      const icon = document.getElementById('capp-icon')?.value?.trim() || '📄';
      const code = document.getElementById('capp-code')?.value?.trim();
      if (!name) { notify('Ошибка', 'Введите название приложения'); return; }
      if (!code) { notify('Ошибка', 'Вставьте HTML-код'); return; }
      CustomApps.add(name, icon, code);
      renderList();
      // Очистить поля
      const n = document.getElementById('capp-name'); const ic = document.getElementById('capp-icon'); const c = document.getElementById('capp-code');
      if (n) n.value = ''; if (ic) ic.value = ''; if (c) c.value = '';
    };

    WM.create({ id: 'app-custom-manager', title: 'Мои приложения', icon: '📦', w: 680, h: 580, html });
    requestAnimationFrame(renderList);
  }
};

// Перехват открытия пользовательских приложений в Apps.open
const _origOpen = Apps.open.bind(Apps);
Apps.open = function(id) {
  if (id.startsWith('capp_')) { CustomApps.open(id); return; }
  _origOpen(id);
};
</script>
